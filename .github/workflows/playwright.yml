name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run regression tests
        run: npx playwright test --project=chromium --grep-invert @known-bug

      - name: Run known defect tests
        continue-on-error: true
        run: npx playwright test --project=chromium --grep @known-bug

      - name: Add known defects summary
        if: always()
        run: |
          {
            echo "## Playwright test summary"
            echo ""
            echo "The automated tests were executed in Chromium."
            echo ""
            echo "### Known defects covered by tests"
            echo ""
            echo "Some tests are marked as expected failures because they document confirmed defects found during testing."
            echo ""
            echo "| Area | Defect | Test approach |"
            echo "|---|---|---|"
            echo "| Appointment summary | Periodic check-up displays \`30 min\` instead of expected \`60 min\` | Expected failure |"
            echo "| Appointment summary | Specialist procedure displays \`6000 zł\` instead of expected \`600 zł\` | Expected failure |"
            echo "| Time slots | Available slots are styled with \`opacity-40\`, which makes them look unavailable | Expected failure |"
            echo "| Back navigation | After changing patient data using the Back button, the summary still displays original values | Expected failure |"
            echo ""
            echo "These tests are still executed. They are not skipped. The CI remains green because the defects are intentionally marked as known issues."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30